<article class="post-card">
  {{ with .Params.image }}
  <a href="{{ $.Permalink }}" class="post-card-img-link">
    <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" class="post-card-img">
  </a>
  {{ else }}
  <a href="{{ .Permalink }}" class="post-card-img-link post-card-img-placeholder">
    {{ with .Params.categories }}{{ range first 1 . }}<span>{{ . }}</span>{{ end }}{{ end }}
  </a>
  {{ end }}
  <div class="post-card-body">
    <div class="post-card-meta">
      {{ with .Params.categories }}
        {{ range first 1 . }}
          <a href="/categories/{{ . | urlize }}/" class="category-badge">{{ . }}</a>
        {{ end }}
      {{ end }}
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02.01.2006" }}</time>
    </div>
    <h2 class="post-card-title">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </h2>
    <p class="post-card-summary">{{ .Summary }}</p>
    <a href="{{ .Permalink }}" class="read-more">Czytaj dalej →</a>
  </div>
</article>
