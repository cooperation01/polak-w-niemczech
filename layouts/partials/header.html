<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo">
      <span class="logo-flag">🇵🇱</span>
      <span class="logo-text">{{ .Site.Title }}</span>
    </a>
    <nav class="main-nav" aria-label="Nawigacja główna">
      <button class="nav-toggle" aria-label="Otwórz menu" aria-expanded="false">☰</button>
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        <li class="nav-item">
          <a href="{{ .URL | absURL }}" class="nav-link {{ if or (eq $.RelPermalink .URL) (eq $.Permalink (.URL | absURL)) }}active{{ end }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
