<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="robots" content="index, follow">

<!-- Open Graph / Facebook -->
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }} – Polacy w Niemczech{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:locale" content="pl_PL">
<meta property="og:image" content="{{ .Site.BaseURL }}{{ strings.TrimPrefix "/" .Site.Params.ogImage }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
{{ if .IsPage }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
<meta property="article:author" content="{{ .Site.Params.author }}">
{{ with .Params.categories }}<meta property="article:section" content="{{ index . 0 }}">{{ end }}
{{ end }}

<!-- Twitter / X Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="twitter:image" content="{{ .Site.BaseURL }}{{ strings.TrimPrefix "/" .Site.Params.ogImage }}">

<!-- Facebook Domain Verification -->
{{ with .Site.Params.facebookDomainVerification }}<meta name="facebook-domain-verification" content="{{ . }}">{{ end }}

<title>{{ if .IsHome }}{{ .Site.Title }} – Polacy w Niemczech{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

<link rel="stylesheet" href="/css/main.css">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="/index.xml">
